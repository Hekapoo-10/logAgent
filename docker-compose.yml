services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: deepl_fp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deepl_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deepl_password}
      POSTGRES_DB: ${POSTGRES_DB:-deepl_fp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deepl_user} -d ${POSTGRES_DB:-deepl_fp}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: deepl_fp_postgres_data
